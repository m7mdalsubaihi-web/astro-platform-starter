<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#05070a"><title>TV Room</title><style>html,body{margin:0;width:100%;height:100%;display:grid;place-items:center;background:#05070a;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans Arabic",Arial,sans-serif}.box{text-align:center}.r{width:44px;height:44px;margin:auto;border:3px solid #2d3239;border-top-color:#e5ae52;border-radius:50%;animation:a .8s linear infinite}.t{margin-top:17px;color:#aeb4bc;font-size:13px}@keyframes a{to{transform:rotate(360deg)}}</style></head><body><div class="box"><div class="r"></div><div class="t">جاري تجهيز الغرفة...</div></div><script>async function boot(){try{const files=[1,2,3,4,5].map(n=>`data/room-${n}.txt?v=20260619-2`);const parts=await Promise.all(files.map(async u=>{const r=await fetch(u,{cache:'no-store'});if(!r.ok)throw new Error('part');return r.text()}));const b64=parts.join('').replace(/\s+/g,'');const bytes=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));let html;if('DecompressionStream'in self){const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));html=await new Response(stream).text()}else{await new Promise((ok,no)=>{const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js';s.onload=ok;s.onerror=no;document.head.appendChild(s)});html=new TextDecoder().decode(pako.ungzip(bytes))}document.open();document.write(html);document.close()}catch(e){document.body.innerHTML='<div style="max-width:420px;padding:28px;text-align:center;line-height:1.8"><b>تعذر تحميل الغرفة</b><div style="margin-top:8px;color:#9ca3ad;font-size:13px">حدّث الصفحة بعد عدة ثوانٍ أو افتحها بمتصفح Chrome أو Edge.</div></div>'}}boot();</script></body></html>
